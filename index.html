<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0d0e10" />
  <title>Stage Plot Generator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
/* Stage Plot Generator — styles */

:root {
  --sp-bg: #0d0e10;
  --sp-panel: #16181c;
  --sp-panel2: #1c1f25;
  --sp-border: #2a2d33;
  --sp-text: #e8e9ed;
  --sp-muted: #8a8d96;
  --sp-subtle: #5a5d65;
  --sp-input: #1c1f25;
  --sp-input-border: #2a2d33;
  --sp-accent: #f59e0b;
  --sp-shadow: 0 1px 0 rgba(255,255,255,.04), 0 8px 24px rgba(0,0,0,.4);
}

:root[data-theme="light"] {
  --sp-bg: #f7f6f3;
  --sp-panel: #ffffff;
  --sp-panel2: #efece6;
  --sp-border: #dcd7cd;
  --sp-text: #1a1a1a;
  --sp-muted: #6b6b6b;
  --sp-subtle: #b8b3aa;
  --sp-input: #ffffff;
  --sp-input-border: #d8d3c8;
  --sp-shadow: 0 1px 0 rgba(0,0,0,.04), 0 8px 24px rgba(0,0,0,.06);
}

* { box-sizing: border-box; }

html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  font-family: 'Geist', -apple-system, BlinkMacSystemFont, system-ui,
               'Helvetica Neue', sans-serif;
  background: var(--sp-bg);
  color: var(--sp-text);
  -webkit-font-smoothing: antialiased;
  font-feature-settings: 'ss01', 'ss02';
}

#root { min-height: 100%; }

.sp-app {
  display: flex;
  flex-direction: column;
  height: 100vh;
  height: 100dvh;
  background: var(--sp-bg);
  color: var(--sp-text);
  overflow: hidden;
}

/* ── TOP BAR ──────────────────────────────────────────────────────────── */

.sp-topbar {
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  align-items: center;
  padding: 12px 18px;
  border-bottom: 1px solid var(--sp-border);
  background: var(--sp-panel);
  position: sticky; top: 0; z-index: 10;
}

.sp-brand {
  display: flex;
  align-items: center;
  gap: 10px;
}
.sp-brand-mark {
  width: 26px;
  height: 26px;
  border-radius: 4px;
  position: relative;
  box-shadow: 0 0 0 1px rgba(0,0,0,0.25), 0 2px 8px rgba(0,0,0,0.2);
}
.sp-brand-mark::after {
  content: '';
  position: absolute;
  inset: 4px;
  border: 1.5px solid rgba(0,0,0,0.4);
  border-radius: 2px;
}
.sp-brand-name {
  font-family: 'JetBrains Mono', ui-monospace, monospace;
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 0.16em;
  color: var(--sp-text);
}
.sp-brand-sub {
  font-family: 'JetBrains Mono', ui-monospace, monospace;
  font-size: 10px;
  letter-spacing: 0.1em;
  color: var(--sp-muted);
}

.sp-tabs {
  display: flex;
  gap: 4px;
  background: var(--sp-panel2);
  padding: 4px;
  border-radius: 8px;
  border: 1px solid var(--sp-border);
}
.sp-tab {
  position: relative;
  appearance: none;
  border: 0;
  background: transparent;
  padding: 7px 18px;
  font: inherit;
  font-size: 12.5px;
  font-weight: 500;
  color: var(--sp-muted);
  border-radius: 6px;
  cursor: pointer;
  letter-spacing: 0.02em;
}
.sp-tab:hover { color: var(--sp-text); }
.sp-tab.on {
  background: var(--sp-bg);
  color: var(--sp-text);
  box-shadow: 0 1px 2px rgba(0,0,0,0.2);
}
.sp-tab-bar {
  position: absolute;
  bottom: 2px;
  left: 18px; right: 18px;
  height: 1.5px;
  background: var(--sp-accent);
  border-radius: 1px;
}

.sp-topbar-actions {
  display: flex;
  justify-content: flex-end;
  gap: 8px;
}

.sp-btn, .sp-btn-ghost, .sp-btn-add {
  appearance: none;
  border: 1px solid var(--sp-border);
  background: var(--sp-panel2);
  color: var(--sp-text);
  font: inherit;
  font-size: 12.5px;
  font-weight: 500;
  padding: 7px 14px;
  border-radius: 7px;
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  letter-spacing: 0.01em;
}
.sp-btn:hover { background: var(--sp-input); border-color: var(--sp-subtle); }
.sp-btn-ghost {
  background: transparent;
}
.sp-btn-ghost:hover {
  background: var(--sp-panel2);
}
.sp-btn-ghost.on {
  background: var(--sp-accent);
  border-color: var(--sp-accent);
  color: rgba(0, 0, 0, 0.85);
}
.sp-btn-ghost.on:hover {
  background: var(--sp-accent);
  filter: brightness(1.05);
}
.sp-btn-primary {
  font-weight: 600;
  border-color: transparent;
}
.sp-btn-primary:hover { filter: brightness(1.08); }

/* ── MAIN LAYOUT ─────────────────────────────────────────────────────── */

.sp-main {
  display: grid;
  grid-template-columns: 380px 1fr;
  flex: 1;
  min-height: 0;
  overflow: hidden;
}
.sp-main.collapsed {
  grid-template-columns: 1fr;
}

/* ── FORM PANEL ──────────────────────────────────────────────────────── */

.sp-form-panel {
  border-right: 1px solid var(--sp-border);
  background: var(--sp-panel);
  overflow: hidden;
  display: flex;
  flex-direction: column;
  min-height: 0;
  min-width: 0;
}

.sp-form-scroll {
  flex: 1;
  overflow-y: auto;
  padding: 18px 18px 60px;
  scrollbar-width: thin;
  scrollbar-color: var(--sp-subtle) transparent;
}
.sp-form-scroll::-webkit-scrollbar { width: 6px; }
.sp-form-scroll::-webkit-scrollbar-thumb {
  background: var(--sp-subtle);
  border-radius: 3px;
}

.sp-form-section { margin-bottom: 24px; }
.sp-form-h {
  display: flex;
  align-items: center;
  gap: 10px;
  margin: 0 0 12px;
  padding-bottom: 10px;
  border-bottom: 1px solid var(--sp-border);
}
.sp-form-h h3 {
  margin: 0;
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 0.02em;
  flex: 1;
}
.sp-form-num {
  font-family: 'JetBrains Mono', ui-monospace, monospace;
  font-size: 11px;
  font-weight: 700;
  color: var(--sp-accent);
  letter-spacing: 0.1em;
}
.sp-count {
  font-family: 'JetBrains Mono', ui-monospace, monospace;
  font-size: 11px;
  color: var(--sp-muted);
  font-weight: 400;
  margin-left: 6px;
}
.sp-btn-add {
  padding: 4px 10px;
  font-size: 11px;
  letter-spacing: 0.04em;
}

.sp-grid-2 {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

.sp-field { display: flex; flex-direction: column; gap: 5px; }
.sp-field-lbl {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  font-size: 10.5px;
  font-weight: 500;
  color: var(--sp-muted);
  letter-spacing: 0.04em;
  text-transform: uppercase;
  white-space: nowrap;
  gap: 6px;
}
.sp-field-lbl > span:first-child { overflow: hidden; text-overflow: ellipsis; }
.sp-field-hint {
  font-size: 10px;
  text-transform: none;
  letter-spacing: 0;
  color: var(--sp-subtle);
}

.sp-input {
  appearance: none;
  border: 1px solid var(--sp-input-border);
  background: var(--sp-input);
  color: var(--sp-text);
  font: inherit;
  font-size: 12.5px;
  padding: 7px 10px;
  border-radius: 6px;
  outline: none;
  width: 100%;
  transition: border-color 0.12s;
}
.sp-input:focus {
  border-color: var(--sp-accent);
  box-shadow: 0 0 0 3px color-mix(in srgb, var(--sp-accent) 18%, transparent);
}
.sp-textarea { resize: vertical; min-height: 60px; font-family: inherit; }
.sp-span-2 { grid-column: 1 / -1; }

/* ── MUSICIAN ROWS ───────────────────────────────────────────────────── */

.sp-mus-list { display: flex; flex-direction: column; gap: 10px; }

.sp-mus-row {
  border: 1px solid var(--sp-border);
  background: var(--sp-panel2);
  border-radius: 8px;
  padding: 10px 10px 12px;
}

.sp-mus-head {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 10px;
}
.sp-mus-num {
  width: 22px;
  height: 22px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'JetBrains Mono', ui-monospace, monospace;
  font-size: 11px;
  font-weight: 700;
  color: rgba(0,0,0,0.78);
  flex-shrink: 0;
}
.sp-mus-name { flex: 1; }
.sp-btn-x {
  width: 24px; height: 24px;
  padding: 0;
  font-size: 16px;
  line-height: 1;
  color: var(--sp-muted);
  background: transparent;
  border: 1px solid transparent;
}
.sp-btn-x:hover {
  background: var(--sp-input);
  border-color: var(--sp-border);
  color: var(--sp-text);
}

.sp-mus-grid {
  display: grid;
  grid-template-columns: 1fr 1fr 0.6fr;
  gap: 8px;
  margin-bottom: 8px;
}

.sp-chips {
  display: flex;
  gap: 5px;
  flex-wrap: wrap;
}
.sp-chip {
  display: inline-flex;
  align-items: center;
  padding: 4px 10px;
  border-radius: 999px;
  border: 1px solid var(--sp-input-border);
  background: var(--sp-input);
  font-size: 11px;
  font-weight: 500;
  color: var(--sp-muted);
  cursor: pointer;
  user-select: none;
  letter-spacing: 0.02em;
}
.sp-chip input { display: none; }
.sp-chip:hover { color: var(--sp-text); }
.sp-chip.on {
  background: var(--sp-accent);
  border-color: var(--sp-accent);
  color: rgba(0,0,0,0.85);
}

.sp-toggle-row {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  padding: 10px;
  border: 1px solid var(--sp-input-border);
  background: var(--sp-input);
  border-radius: 6px;
  cursor: pointer;
  grid-column: span 1;
}
.sp-toggle-row input { margin-top: 3px; accent-color: var(--sp-accent); }
.sp-toggle-row.on {
  border-color: var(--sp-accent);
  background: color-mix(in srgb, var(--sp-accent) 8%, var(--sp-input));
}
.sp-toggle-h { font-size: 12px; font-weight: 500; }
.sp-toggle-sub {
  font-size: 10.5px;
  color: var(--sp-muted);
  margin-top: 2px;
}

/* ── CANVAS PANEL ────────────────────────────────────────────────────── */

.sp-canvas-panel {
  display: flex;
  flex-direction: column;
  overflow-y: auto;
  background: var(--sp-bg);
  min-height: 0;
  min-width: 0;
}

.sp-canvas-head {
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  padding: 24px 28px 18px;
  gap: 30px;
  border-bottom: 1px solid var(--sp-border);
}
.sp-canvas-head-l {
  display: flex;
  align-items: center;
  gap: 18px;
  min-width: 0;
}
.sp-header-logo {
  width: 56px;
  height: 56px;
  border-radius: 6px;
  object-fit: contain;
  background: var(--sp-panel2);
  padding: 4px;
  border: 1px solid var(--sp-border);
  flex-shrink: 0;
}
.sp-canvas-eyebrow {
  font-family: 'JetBrains Mono', ui-monospace, monospace;
  font-size: 10.5px;
  font-weight: 600;
  letter-spacing: 0.14em;
  margin-bottom: 6px;
}
.sp-canvas-band {
  margin: 0;
  font-size: 32px;
  font-weight: 800;
  letter-spacing: -0.01em;
  line-height: 1;
  text-wrap: balance;
}
.sp-canvas-meta {
  display: flex;
  gap: 8px;
  margin-top: 8px;
  font-size: 12px;
  color: var(--sp-muted);
  font-family: 'JetBrains Mono', ui-monospace, monospace;
  letter-spacing: 0.02em;
  flex-wrap: wrap;
}
.sp-canvas-head-r {
  display: flex;
  gap: 20px;
  flex-shrink: 0;
}
.sp-stat {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  padding: 8px 14px;
  border-left: 1px solid var(--sp-border);
}
.sp-stat-num {
  font-family: 'JetBrains Mono', ui-monospace, monospace;
  font-size: 26px;
  font-weight: 700;
  line-height: 1;
  font-variant-numeric: tabular-nums;
}
.sp-stat-lbl {
  font-size: 10px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--sp-muted);
  margin-top: 4px;
}

.sp-canvas-frame {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px 28px;
  min-height: 0;
}
.sp-canvas-inner {
  width: 100%;
  max-width: 1100px;
  transform-origin: top center;
}
.sp-stage-wrap {
  width: 100%;
  background: var(--sp-bg);
  border-radius: 4px;
  overflow: hidden;
}
.sp-stage {
  width: 100%;
  height: auto;
  display: block;
  user-select: none;
  -webkit-user-select: none;
}
.sp-stage .sp-draggable [style*="grab"]:active { cursor: grabbing !important; }

.sp-canvas-foot {
  padding: 18px 28px 32px;
  border-top: 1px solid var(--sp-border);
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 24px;
}

.sp-legend {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px 16px;
  color: var(--sp-muted);
  align-content: start;
}
.sp-legend-item {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 11.5px;
  color: var(--sp-text);
  font-family: 'JetBrains Mono', ui-monospace, monospace;
  letter-spacing: 0.02em;
}
.sp-legend-item svg { color: var(--sp-muted); flex-shrink: 0; }

.sp-notes {
  border-left: 2px solid var(--sp-accent);
  padding: 4px 0 4px 14px;
}
.sp-notes-h {
  font-family: 'JetBrains Mono', ui-monospace, monospace;
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.14em;
  color: var(--sp-accent);
  margin-bottom: 6px;
}
.sp-notes-body {
  font-size: 12.5px;
  color: var(--sp-text);
  line-height: 1.55;
  text-wrap: pretty;
}

/* ── INPUT LIST ──────────────────────────────────────────────────────── */

.sp-il { padding: 28px 32px 60px; max-width: 1100px; margin: 0 auto; width: 100%; }

.sp-il-head {
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
  padding-bottom: 18px;
  border-bottom: 2px solid var(--sp-text);
  margin-bottom: 18px;
}
.sp-il-eyebrow {
  font-family: 'JetBrains Mono', ui-monospace, monospace;
  font-size: 10.5px;
  font-weight: 600;
  letter-spacing: 0.14em;
  color: var(--sp-muted);
  margin-bottom: 6px;
}
.sp-il-title {
  margin: 0;
  font-size: 36px;
  font-weight: 800;
  letter-spacing: -0.01em;
  line-height: 1;
}
.sp-il-meta {
  margin-top: 8px;
  color: var(--sp-muted);
  font-family: 'JetBrains Mono', ui-monospace, monospace;
  font-size: 12px;
  letter-spacing: 0.02em;
}
.sp-il-totals {
  display: flex;
  gap: 24px;
}
.sp-il-totals-row {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
}
.sp-il-totals-num {
  font-family: 'JetBrains Mono', ui-monospace, monospace;
  font-size: 30px;
  font-weight: 700;
  line-height: 1;
  font-variant-numeric: tabular-nums;
}
.sp-il-totals-lbl {
  font-size: 10px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--sp-muted);
  margin-top: 4px;
}

.sp-il-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 12.5px;
}
.sp-il-table th {
  text-align: left;
  font-family: 'JetBrains Mono', ui-monospace, monospace;
  font-size: 10px;
  letter-spacing: 0.14em;
  color: var(--sp-muted);
  font-weight: 600;
  padding: 8px 10px;
  border-bottom: 1px solid var(--sp-border);
}
.sp-il-table td {
  padding: 10px 10px;
  border-bottom: 1px solid var(--sp-border);
  vertical-align: middle;
}
.sp-il-table tr:hover td {
  background: color-mix(in srgb, var(--sp-accent) 5%, transparent);
}
.sp-il-ch {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 30px;
  height: 22px;
  border-radius: 4px;
  border: 1.5px solid;
  font-family: 'JetBrains Mono', ui-monospace, monospace;
  font-size: 11px;
  font-weight: 700;
  font-variant-numeric: tabular-nums;
  color: var(--sp-text);
}
.sp-il-actor { color: var(--sp-muted); }

.sp-il-toolbar {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 14px;
  padding: 8px 10px;
  background: var(--sp-panel2);
  border: 1px solid var(--sp-border);
  border-radius: 8px;
}
.sp-il-toolbar-spacer { flex: 1; }

.sp-il-table-editable td {
  padding: 4px 6px;
}
.sp-il-input {
  appearance: none;
  width: 100%;
  border: 1px solid transparent;
  background: transparent;
  color: var(--sp-text);
  font: inherit;
  font-size: 12.5px;
  padding: 5px 7px;
  border-radius: 5px;
  outline: none;
  transition: background 0.1s, border-color 0.1s;
}
.sp-il-input:hover {
  background: color-mix(in srgb, var(--sp-accent) 5%, var(--sp-panel2));
}
.sp-il-input:focus {
  background: var(--sp-input);
  border-color: var(--sp-accent);
  box-shadow: 0 0 0 3px color-mix(in srgb, var(--sp-accent) 18%, transparent);
}
.sp-il-ch-input {
  width: 44px;
  text-align: center;
  font-family: 'JetBrains Mono', ui-monospace, monospace;
  font-weight: 700;
  font-variant-numeric: tabular-nums;
  border: 1.5px solid currentColor;
  border-radius: 4px;
  padding: 3px 4px;
  font-size: 11px;
  -moz-appearance: textfield;
}
.sp-il-ch-input::-webkit-inner-spin-button,
.sp-il-ch-input::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
.sp-il-src { font-weight: 600; }
.sp-il-mic, .sp-il-note {
  font-family: 'JetBrains Mono', ui-monospace, monospace;
  font-size: 12px;
}
.sp-il-stand {
  font-family: 'JetBrains Mono', ui-monospace, monospace;
  font-size: 12px;
  color: var(--sp-muted);
  text-transform: lowercase;
  background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='8' height='5' viewBox='0 0 8 5'><path fill='%238a8d96' d='M0 0h8L4 5z'/></svg>");
  background-repeat: no-repeat;
  background-position: right 8px center;
  padding-right: 22px;
}
.sp-il-actor {
  color: var(--sp-text);
  appearance: none;
  background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='8' height='5' viewBox='0 0 8 5'><path fill='%238a8d96' d='M0 0h8L4 5z'/></svg>");
  background-repeat: no-repeat;
  background-position: right 8px center;
  padding-right: 22px;
}
.sp-il-actor:not(:focus) { color: var(--sp-muted); }
.sp-il-handle {
  display: flex;
  flex-direction: column;
  gap: 1px;
}
.sp-il-arr {
  appearance: none;
  border: 0;
  background: transparent;
  color: var(--sp-subtle);
  font-size: 8px;
  line-height: 1;
  cursor: pointer;
  padding: 2px 6px;
  border-radius: 3px;
}
.sp-il-arr:hover:not(:disabled) {
  background: var(--sp-panel2);
  color: var(--sp-text);
}
.sp-il-arr:disabled { opacity: 0.3; cursor: not-allowed; }

.sp-il-empty {
  text-align: center;
  padding: 40px 20px !important;
  color: var(--sp-muted);
  font-style: italic;
}

.sp-bl-item-cell {
  display: flex;
  align-items: center;
  gap: 8px;
}
.sp-bl-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
  box-shadow: 0 0 0 1px rgba(0,0,0,0.2);
}
.sp-bl-owner {
  text-transform: none !important;
  font-weight: 600;
}
.sp-bl-owner-band   { color: #06d6a0; }
.sp-bl-owner-house  { color: #6c8cff; }
.sp-bl-owner-venue  { color: #ffd166; }
.sp-bl-owner-rented { color: #ef476f; }

.sp-il-table-editable tr:hover td { background: transparent; }

.sp-il-sum-h {

  font-weight: 600;

.sp-il-sum-num {

  font-weight: 700;

.sp-il-sum-lbl {

  text-transform: uppercase;
  color: var(--sp-muted);
  margin-top: 2px;
}
.sp-il-sum-text {
  font-size: 12px;
  line-height: 1.55;
  color: var(--sp-text);
}
.sp-il-sum-muted { color: var(--sp-muted); margin-top: 2px; }

  margin-top: 14px;

  background: var(--sp-panel2);
  border: 1px solid var(--sp-border);
  border-radius: 8px;

  display: flex;
  align-items: center;
  justify-content: space-between;
  font-family: 'JetBrains Mono', ui-monospace, monospace;
  font-size: 10.5px;
  font-weight: 600;
  letter-spacing: 0.14em;
  color: var(--sp-muted);
  margin-bottom: 8px;
}
.sp-sublist-actions { display: flex; gap: 6px; }
.sp-btn-tiny {
  padding: 3px 8px;
  font-size: 10.5px;
  letter-spacing: 0.04em;
}
.sp-sublist-hint {
  font-size: 10.5px;
  color: var(--sp-subtle);
  margin-bottom: 10px;
  font-style: italic;
}

  display: flex;
  flex-wrap: wrap;
  gap: 5px;

.sp-pill {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 4px 4px 4px 8px;
  background: var(--sp-input);
  border: 1px solid var(--sp-input-border);
  border-radius: 999px;
  font-size: 11px;
  font-family: 'JetBrains Mono', ui-monospace, monospace;

.sp-pill-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: #fbbf24;
  box-shadow: 0 0 0 1px rgba(0,0,0,0.2);
}
.sp-pill-label { font-weight: 600; color: var(--sp-text); }
.sp-pill-coord { color: var(--sp-muted); font-size: 10px; }
.sp-pill-x {
  appearance: none;
  border: 0;
  background: transparent;
  color: var(--sp-muted);
  width: 18px;
  height: 18px;
  border-radius: 50%;
  font-size: 14px;
  line-height: 1;
  cursor: pointer;
  padding: 0;
  flex-shrink: 0;
}
.sp-pill-x:hover {
  background: var(--sp-border);
  color: var(--sp-text);
}
.sp-riser-list { display: flex; flex-direction: column; gap: 8px; }
.sp-riser-row {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 6px;
  background: var(--sp-input);
  border: 1px solid var(--sp-input-border);
  border-radius: 6px;
}
.sp-riser-label { flex: 1; min-width: 0; font-size: 12px; }
.sp-riser-dims {
  display: flex;
  gap: 4px;
  flex-shrink: 0;
}
.sp-riser-dims label {
  display: flex;
  flex-direction: column;
  align-items: center;
  font-family: 'JetBrains Mono', ui-monospace, monospace;
  font-size: 9px;
  color: var(--sp-muted);
  letter-spacing: 0.06em;
}
.sp-riser-dims label span { margin-bottom: 2px; }
.sp-riser-dims input {
  width: 48px;
  text-align: center;
  font-variant-numeric: tabular-nums;
  padding: 4px 2px;
  font-size: 11px;
}

.sp-logo-row {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px;
  background: var(--sp-panel2);
  border: 1px dashed var(--sp-input-border);
  border-radius: 8px;
  margin-top: 4px;
}
.sp-logo-preview {
  width: 56px;
  height: 56px;
  flex-shrink: 0;
  background: var(--sp-input);
  border: 1px solid var(--sp-input-border);
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}
.sp-logo-preview img { width: 100%; height: 100%; object-fit: contain; }
.sp-logo-preview span {
  font-family: 'JetBrains Mono', ui-monospace, monospace;
  font-size: 9px;
  letter-spacing: 0.18em;
  color: var(--sp-subtle);
  font-weight: 700;
}
.sp-logo-actions {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  align-items: center;
  flex: 1;
  min-width: 0;
}
.sp-btn-upload { cursor: pointer; }
.sp-logo-hint {
  flex-basis: 100%;
  font-size: 10.5px;
  color: var(--sp-muted);
  margin-top: 2px;
}

/* Mobile-only close button inside form panel — hidden on desktop */
.sp-form-mobile-close { display: none; }
.sp-form-backdrop { display: none; }

/* ── PRINT ───────────────────────────────────────────────────────────── */

@media print {
  :root { --sp-bg: #ffffff; --sp-panel: #ffffff; --sp-text: #000; }
  .sp-topbar, .sp-form-panel, .twk-panel { display: none !important; }
  .sp-main { grid-template-columns: 1fr !important; }
  .sp-canvas-panel { overflow: visible !important; }
  .sp-canvas-head { padding: 12px 20px !important; }
  .sp-canvas-frame { padding: 8px 20px !important; }
  .sp-canvas-foot { padding: 12px 20px !important; }
  body { background: #fff !important; color: #000 !important; }
  @page { margin: 12mm; size: landscape; }
}

/* ── MOBILE ──────────────────────────────────────────────────────────── */

@media (max-width: 900px) {
  .sp-main {
    grid-template-columns: 1fr !important;
    position: relative;
  }

  /* Form panel becomes an overlay drawer */
  .sp-form-panel {
    position: absolute;
    top: 0; left: 0; bottom: 0;
    width: 92%;
    max-width: 380px;
    z-index: 50;
    box-shadow: 4px 0 32px rgba(0, 0, 0, 0.5);
    border-right: 1px solid var(--sp-border);

  .sp-form-backdrop {
    display: block;
    position: absolute;
    inset: 0;
    background: rgba(0, 0, 0, 0.55);
    z-index: 49;
  }
  .sp-form-mobile-close {
    display: flex;
    justify-content: flex-end;
    padding: 8px 10px 0;
  }
  .sp-form-mobile-close .sp-btn-ghost {
    font-size: 11px;
    padding: 5px 10px;
  }

  /* Topbar — two rows: brand + actions, then tabs */
  .sp-topbar {
    grid-template-columns: 1fr auto;
    grid-template-areas:
      "brand actions"
      "tabs tabs";
    padding: 8px 10px;
    row-gap: 6px;
    column-gap: 8px;
  }
  .sp-brand { grid-area: brand; }
  .sp-tabs {
    grid-area: tabs;
    justify-self: stretch;
    padding: 3px;
  }
  .sp-tab {
    padding: 5px 10px;
    font-size: 11px;
    flex: 1;
    text-align: center;
  }
  .sp-tab-bar { left: 8px; right: 8px; }
  .sp-topbar-actions {
    grid-area: actions;
    gap: 4px;
    flex-wrap: nowrap;
  }
  .sp-brand-sub { display: none; }
  .sp-brand-name { font-size: 11px; }
  .sp-brand-mark { width: 22px; height: 22px; }
  .sp-btn, .sp-btn-ghost {
    padding: 6px 8px;
    font-size: 11px;
    gap: 4px;
  }
  /* Hide "Form" toggle button text — first ghost button in topbar-actions */
  .sp-topbar-actions .sp-btn-ghost:first-child {
    min-width: 36px;
    padding: 6px;
  }

  /* Canvas head stacks */
  .sp-canvas-head {
    flex-direction: column;
    align-items: flex-start;
    padding: 16px 14px 12px;
    gap: 14px;
  }
  .sp-canvas-head-l { gap: 12px; width: 100%; }
  .sp-canvas-band { font-size: 22px; }
  .sp-canvas-meta { font-size: 11px; gap: 4px; }
  .sp-canvas-head-r {
    width: 100%;
    justify-content: flex-start;
    gap: 0;
  }
  .sp-stat {
    flex: 1;
    align-items: center;
    padding: 6px 8px;
    border-left: 1px solid var(--sp-border);
  }
  .sp-stat:first-child { border-left: 0; padding-left: 0; }
  .sp-stat-num { font-size: 22px; }

  .sp-canvas-frame { padding: 12px 8px; }
  .sp-canvas-foot {
    grid-template-columns: 1fr;
    padding: 12px 14px 28px;
    gap: 14px;
  }
  .sp-legend { grid-template-columns: repeat(2, 1fr); gap: 6px 12px; }
  .sp-header-logo { width: 44px; height: 44px; }

  /* Form grids collapse to 1 col */
  .sp-grid-2 { grid-template-columns: 1fr; }
  .sp-mus-grid { grid-template-columns: 1fr 1fr; }
  .sp-mus-grid .sp-field:nth-child(3) { grid-column: span 2; }
  .sp-form-scroll { padding: 14px 14px 50px; }
  .sp-form-section { margin-bottom: 18px; }

  /* Riser row gets tighter */
  .sp-riser-row { flex-wrap: wrap; }
  .sp-riser-label { flex-basis: 100%; }
  .sp-riser-dims input { width: 44px; }

  /* Tables (input list + backline) — horizontal scroll on narrow screens */
  .sp-il { padding: 16px 12px 40px; }
  .sp-il-head {
    flex-direction: column;
    align-items: flex-start;
    gap: 14px;
  }
  .sp-il-title { font-size: 26px; }
  .sp-il-totals { gap: 16px; }
  .sp-il-toolbar { flex-wrap: wrap; gap: 6px; }
  .sp-il-toolbar-spacer { display: none; }

  .sp-il-table-editable {
    display: block;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    min-width: 0;
    white-space: nowrap;
  }
  .sp-il-table-editable thead,
  .sp-il-table-editable tbody { display: table; width: max-content; min-width: 100%; }
  .sp-il-table-editable tr { display: table-row; }
  .sp-il-table-editable td,
  .sp-il-table-editable th { display: table-cell; white-space: normal; }
  .sp-il-input {
    font-size: 13px; /* prevent iOS auto-zoom on focus */
  }
  .sp-il-foot {
    grid-template-columns: 1fr;
    gap: 18px;
    padding-top: 18px;
  }

  /* Tweaks panel — fit narrow screens */
  .twk-panel {
    width: calc(100vw - 24px) !important;
    max-width: 320px;
  }
}

/* Extra-narrow phones */
@media (max-width: 420px) {
  .sp-topbar-actions { gap: 3px; }
  .sp-btn span, .sp-btn-ghost span:not(.sp-tab-bar) {
    display: inline; /* keep */
  }
  /* Compact PDF/PNG to icon-only */
  .sp-btn { padding: 6px 7px; }
  .sp-canvas-band { font-size: 19px; }
  .sp-il-title { font-size: 22px; }
}

    filter:drop-shadow(0 1px 1px rgba(0,0,0,.3))}

// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
    // Same-window signal so in-page listeners (deck-stage rail thumbnails)
    // can react — the parent message only reaches the host, not peers.
    window.dispatchEvent(new CustomEvent('tweakchange', { detail: edits }));
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const dragCleanupRef = React.useRef(null);
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  React.useEffect(() => () => { dragCleanupRef.current?.(); }, []);

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
      dragCleanupRef.current = null;
    };
    dragCleanupRef.current = up;
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-omelette-chrome=""
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">
          {children}
        </div>
      </div>
    </>
  );
}

              role="switch" aria-checked={!!value}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  // Segments wrap mid-word once per-segment width runs out. The track is
  // ~248px (280 panel − 28 body pad − 4 seg pad), each button loses 12px
  // to its own padding, and 11.5px system-ui averages ~6.3px/char — so 2
  // options fit ~16 chars each, 3 fit ~10. Past that (or >3 options), fall
  // back to a dropdown rather than wrap.
  const labelLen = (o) => String(typeof o === 'object' ? o.label : o).length;
  const maxLen = options.reduce((m, o) => Math.max(m, labelLen(o)), 0);
  const fitsAsSegments = maxLen <= ({ 2: 16, 3: 10 }[options.length] ?? 0);
  if (!fitsAsSegments) {
    // <select> emits strings — map back to the original option value so the
    // fallback stays type-preserving (numbers, booleans) like the segment path.
    const resolve = (s) => {
      const m = options.find((o) => String(typeof o === 'object' ? o.value : o) === s);
      return m === undefined ? s : typeof m === 'object' ? m.value : m;
    };
    return <TweakSelect label={label} value={value} options={options}
                        onChange={(s) => onChange(resolve(s))} />;
  }
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (

             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

// Relative-luminance contrast pick — checkmarks drawn over a swatch need to
// read on both #111 and #fafafa without per-option configuration. Hex input
// only (#rgb / #rrggbb); named or rgb()/hsl() colors fall through to "light".
function __twkIsLight(hex) {
  const h = String(hex).replace('#', '');
  const x = h.length === 3 ? h.replace(/./g, (c) => c + c) : h.padEnd(6, '0');
  const n = parseInt(x.slice(0, 6), 16);
  if (Number.isNaN(n)) return true;
  const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
  return r * 299 + g * 587 + b * 114 > 148000;
}

const __TwkCheck = ({ light }) => (
  <svg viewBox="0 0 14 14" aria-hidden="true">
    <path d="M3 7.2 5.8 10 11 4.2" fill="none" strokeWidth="2.2"
          strokeLinecap="round" strokeLinejoin="round"
          stroke={light ? 'rgba(0,0,0,.78)' : '#fff'} />
  </svg>
);

// TweakColor — curated color/palette picker. Each option is either a single
// hex string or an array of 1-5 hex strings; the card adapts — a lone color
// renders solid, a palette renders colors[0] as the hero (left ~2/3) with the
// rest stacked in a sharp column on the right. onChange emits the
// option in the shape it was passed (string stays string, array stays array).
// Without options it falls back to the native color input for back-compat.
function TweakColor({ label, value, options, onChange }) {
  if (!options || !options.length) {
    return (
      <div className="twk-row twk-row-h">
        <div className="twk-lbl"><span>{label}</span></div>
        <input type="color" className="twk-swatch" value={value}
               onChange={(e) => onChange(e.target.value)} />
      </div>
    );
  }
  // Native <input type=color> emits lowercase hex per the HTML spec, so
  // compare case-insensitively. String() guards JSON.stringify(undefined),
  // which returns the primitive undefined (no .toLowerCase).
  const key = (o) => String(JSON.stringify(o)).toLowerCase();
  const cur = key(value);
  return (
    <TweakRow label={label}>
      <div className="twk-chips" role="radiogroup">
        {options.map((o, i) => {
          const colors = Array.isArray(o) ? o : [o];
          const [hero, ...rest] = colors;
          const sup = rest.slice(0, 4);
          const on = key(o) === cur;
          return (
            <button key={i} type="button" className="twk-chip" role="radio"
                    aria-checked={on} data-on={on ? '1' : '0'}
                    aria-label={colors.join(', ')} title={colors.join(' · ')}
                    style={{ background: hero }}
                    onClick={() => onChange(o)}>
              {sup.length > 0 && (
                <span>
                  {sup.map((c, j) => <i key={j} style={{ background: c }} />)}
                </span>
              )}
              {on && <__TwkCheck light={__twkIsLight(hero)} />}
            </button>
          );
        })}
      </div>
    </TweakRow>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

  <script type="text/babel" data-presets="react">
// stage.jsx — SVG stage canvas with illustrated top-down icons, draggable
// musicians, stage size presets, and plot view emphasis (full/foh/monitor).

const STAGE_W = 1000;
const STAGE_H = 600;

// Stage shapes: each returns a clip path (and a stage outline path) given dims.
function stageShapePaths(shape, w, h) {
  switch (shape) {
    case 'thrust': {
      const tx = w * 0.36, tw = w * 0.28, th = h * 0.18;
      return {
        outline: `M0 0 H${w} V${h} H${tx + tw} V${h + th} H${tx} V${h} H0 Z`,
        viewExtend: th,
      };
    }
    case 'round': {
      // Circle inscribed in viewbox (we draw an ellipse using full width).
      // Audience surrounds — handled by callers.
      return { outline: '', viewExtend: 0, round: true };
    }
    case 'wide':
    case 'rect':
    default:
      return { outline: `M0 0 H${w} V${h} H0 Z`, viewExtend: 0 };
  }
}

// Resolve musician on-stage XY: preset key or custom coords.
function musicianXY(m) {
  if (m.pos === 'custom' && Number.isFinite(m.x) && Number.isFinite(m.y)) {
    return { x: m.x, y: m.y, label: 'Custom' };
  }
  const p = POSITIONS[m.pos];
  return p ? { x: p.x, y: p.y, label: p.label } : { x: STAGE_W / 2, y: STAGE_H / 2, label: '—' };
}

// Generic SVG drag wrapper. Translates client deltas into the SVG user-space
// of whatever <svg> owns the rendered <g>, then calls onMove with new x,y.
function DraggableG({ x, y, onMove, cursor = 'grab', className = '',
                      bounds = { x0: 30, y0: 30, x1: STAGE_W - 30, y1: STAGE_H - 30 },
                      children }) {
  const ref = React.useRef(null);
  const cleanupRef = React.useRef(null);

  React.useEffect(() => () => { cleanupRef.current?.(); }, []);

  const onPointerDown = (e) => {
    if (!onMove) return;
    e.preventDefault();
    e.stopPropagation();
    const svg = ref.current.ownerSVGElement;
    if (!svg) return;
    const pt = svg.createSVGPoint();
    const ctm = svg.getScreenCTM();
    if (!ctm) return;
    const inv = ctm.inverse();
    const toSvg = (cx, cy) => {
      pt.x = cx; pt.y = cy;
      return pt.matrixTransform(inv);
    };
    const start = toSvg(e.clientX, e.clientY);
    const sp = { x, y };
    const move = (ev) => {
      const cur = toSvg(ev.clientX, ev.clientY);
      const nx = Math.max(bounds.x0, Math.min(bounds.x1, sp.x + (cur.x - start.x)));
      const ny = Math.max(bounds.y0, Math.min(bounds.y1, sp.y + (cur.y - start.y)));
      onMove(nx, ny);
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
      cleanupRef.current = null;
    };
    cleanupRef.current = up;
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <g ref={ref} className={`sp-draggable ${className}`}
       transform={`translate(${x} ${y})`}
       style={onMove ? { cursor } : undefined}
       onPointerDown={onPointerDown}>
      {children}
    </g>
  );
}

// Plot-type emphasis: returns opacity for a category given current view.
function emphFor(plotType, category) {
  const t = PLOT_TYPES[plotType] || PLOT_TYPES.full;
  return t.emphasize.includes(category) ? 1 : 0.22;
}

// ── Illustrated icon primitives ─────────────────────────────────────────────

const MusicianIcon = React.memo(function MusicianIcon({ role, name, c, dimmed }) {
  const r = ROLES[role];
  const color = r?.color || '#888';
  const short = r?.short || '?';
  return (
    <g opacity={dimmed ? 0.5 : 1}>
      <ellipse cx="0" cy="6" rx="22" ry="14" fill={color} opacity="0.18" />
      <ellipse cx="0" cy="6" rx="22" ry="14" fill="none" stroke={color} strokeWidth="1.5" />
      <circle cx="0" cy="-2" r="11" fill={color} />
      <circle cx="0" cy="-2" r="11" fill="none" stroke={c.bg} strokeWidth="1.5" />
      <text x="0" y="1.5" textAnchor="middle" fontSize="9" fontWeight="700"
            fontFamily="ui-monospace,'JetBrains Mono',monospace" fill={c.bg}>
        {short}
      </text>
      <g transform="translate(0 32)">
        <rect x="-38" y="-9" width="76" height="18" rx="3" fill={c.panel}
              stroke={color} strokeWidth="1" />
        <text x="0" y="3" textAnchor="middle" fontSize="9" fontWeight="600"
              fontFamily="ui-sans-serif,system-ui" fill={c.text}>
          {(name || r?.label || '').slice(0, 14).toUpperCase()}
        </text>
      </g>
    </g>
  );
});

function WedgeIcon({ x, y, rot = 0, c, label }) {
  return (
    <g transform={`translate(${x} ${y}) rotate(${rot})`}>
      <path d="M -18 -6 L 18 -6 L 14 8 L -14 8 Z" fill={c.panel2}

      <line x1="-10" y1="3" x2="10" y2="3" stroke={c.muted} strokeWidth="0.8" />
      <text x="0" y="-9" textAnchor="middle" fontSize="6"
            fontFamily="ui-monospace,monospace" fill={c.muted}>{label || 'WEDGE'}</text>
    </g>
  );
}

function AmpIcon({ x, y, label = 'AMP', rot = 0, c }) {
  return (
    <g transform={`translate(${x} ${y}) rotate(${rot})`}>
      <rect x="-22" y="-12" width="44" height="24" rx="2" fill={c.panel2}
            stroke={c.muted} strokeWidth="1" />
      <circle cx="-10" cy="0" r="6" fill="none" stroke={c.muted} strokeWidth="1" />
      <circle cx="10" cy="0" r="6" fill="none" stroke={c.muted} strokeWidth="1" />
      <line x1="-22" y1="-12" x2="-18" y2="-8" stroke={c.muted} strokeWidth="0.6" />
      <line x1="22" y1="-12" x2="18" y2="-8" stroke={c.muted} strokeWidth="0.6" />
      <text x="0" y="-15" textAnchor="middle" fontSize="6"
            fontFamily="ui-monospace,monospace" fill={c.muted}>{label}</text>
    </g>

}

function PedalboardIcon({ x, y, c, rot = 0 }) {
  return (
    <g transform={`translate(${x} ${y}) rotate(${rot})`}>
      <rect x="-16" y="-7" width="32" height="14" rx="2" fill={c.panel2}
            stroke={c.muted} strokeWidth="1" />
      {[-10, -3, 4, 11].map((px, i) => (
        <circle key={i} cx={px} cy="0" r="2.2" fill={c.muted} opacity="0.7" />
      ))}
      <text x="0" y="-10" textAnchor="middle" fontSize="6"
            fontFamily="ui-monospace,monospace" fill={c.muted}>PEDALS</text>
    </g>

}

function DIIcon({ x, y, c, label = 'DI' }) {
  return (
    <g transform={`translate(${x} ${y})`}>
      <rect x="-7" y="-7" width="14" height="14" rx="1.5" fill={c.accent}
            stroke="#000" strokeOpacity="0.3" strokeWidth="0.8" />
      <text x="0" y="2" textAnchor="middle" fontSize="7" fontWeight="700"
            fontFamily="ui-monospace,monospace" fill="#000" fillOpacity="0.78">
        {label}
      </text>
    </g>
  );
}

function IEMIcon({ x, y, c }) {
  return (
    <g transform={`translate(${x} ${y})`}>
      <rect x="-8" y="-6" width="16" height="12" rx="1.5" fill={c.panel2}
            stroke={c.muted} strokeWidth="0.8" />
      <circle cx="0" cy="0" r="2.5" fill="none" stroke={c.muted} strokeWidth="0.8" />
      <text x="0" y="-9" textAnchor="middle" fontSize="5.5"
            fontFamily="ui-monospace,monospace" fill={c.muted}>IEM</text>
    </g>
  );
}

function MicIcon({ x, y, c, accent }) {
  return (
    <g transform={`translate(${x} ${y})`}>
      <circle cx="0" cy="0" r="4" fill={accent} stroke="#000" strokeOpacity="0.35"
              strokeWidth="0.8" />
      <circle cx="0" cy="0" r="1.6" fill="#000" fillOpacity="0.4" />
      <circle cx="0" cy="0" r="9" fill="none" stroke={c.muted} strokeWidth="0.6"
              strokeDasharray="2 2" opacity="0.5" />
    </g>
  );
}

function PowerIcon({ c }) {
  return (
    <g>
      <rect x="-9" y="-7" width="18" height="14" rx="1.5" fill="#fbbf24"
            stroke="#000" strokeOpacity="0.3" strokeWidth="0.8" />
      <path d="M -2 -4 L -3 0 L 1 0 L -1 4 L 4 -1 L 1 -1 L 2 -4 Z"
            fill="#000" fillOpacity="0.7" />
      <text x="0" y="-9.5" textAnchor="middle" fontSize="5.5"
            fontFamily="ui-monospace,monospace" fill={c.muted}>AC 20A</text>
    </g>
  );
}

// Riser — draggable rectangle, optional label + height in inches.
function Riser({ r, c, onMove, onResize }) {
  return (
    <DraggableG x={r.x} y={r.y} onMove={onMove} cursor="move"
                bounds={{ x0: r.w / 2 + 10, y0: r.h / 2 + 10,
                          x1: STAGE_W - r.w / 2 - 10,
                          y1: STAGE_H - r.h / 2 - 10 }}>
      <rect x={-r.w / 2} y={-r.h / 2} width={r.w} height={r.h} rx="3"
            fill={c.panel2} stroke={c.muted} strokeWidth="1.2" />
      <rect x={-r.w / 2 + 2} y={-r.h / 2 + 2} width={r.w - 4} height={r.h - 4}
            rx="2" fill="none" stroke={c.muted} strokeWidth="0.5"
            strokeDasharray="2 4" opacity="0.6" />
      <text x="0" y={-r.h / 2 - 6} textAnchor="middle" fontSize="7"
            fontFamily="ui-monospace,monospace" fill={c.muted}
            letterSpacing="0.16em">
        {(r.label || 'RISER').toUpperCase()} · {Math.round(r.w / 16)}′ × {Math.round(r.h / 16)}′ × {r.heightIn || 0}″
      </text>
    </DraggableG>
  );
}

const DrumKit = React.memo(function DrumKit({ x, y, c }) {
  return (
    <g transform={`translate(${x} ${y})`}>
      <circle cx="0" cy="32" r="6" fill={c.panel2} stroke={c.muted} strokeWidth="0.8" />
      <circle cx="0" cy="8" r="14" fill={c.panel2} stroke={c.muted} strokeWidth="1.2" />
      <circle cx="0" cy="8" r="8" fill="none" stroke={c.muted} strokeWidth="0.6" />
      <circle cx="-13" cy="14" r="7" fill={c.panel} stroke={c.muted} strokeWidth="1" />
      <circle cx="-22" cy="6" r="6" fill="none" stroke="#facc15" strokeWidth="1.5" />
      <circle cx="-22" cy="6" r="2" fill="#facc15" />
      <circle cx="-7" cy="-6" r="6" fill={c.panel} stroke={c.muted} strokeWidth="1" />
      <circle cx="16" cy="14" r="9" fill={c.panel} stroke={c.muted} strokeWidth="1" />
      <circle cx="-18" cy="-8" r="9" fill="none" stroke="#facc15" strokeWidth="1.2" opacity="0.7" />
      <circle cx="20" cy="-2" r="10" fill="none" stroke="#facc15" strokeWidth="1.2" opacity="0.7" />
    </g>
  );
});

// ── Build per-musician satellite gear positions ────────────────────────────

// Each satellite is annotated with a category so plot-type emphasis can dim
// the right things.
function gearForMusician(m, posXY, c) {
  const items = [];
  const { x, y } = posXY;

  for (let i = 0; i < (m.gear.wedges || 0); i++) {
    const offset = (i - (m.gear.wedges - 1) / 2) * 26;
    items.push({
      Comp: WedgeIcon, cat: 'mon',
      props: { x: x + offset, y: y + 38, rot: 0, c, label: `MIX ${i + 1}` },
      key: `w${i}`,
    });
  }

  if (m.role === 'vocal' || m.role === 'bgv') {
    items.push({
      Comp: MicIcon, cat: 'mic',
      props: { x, y: y + 22, c, accent: c.accent },
      key: 'mic',
    });
  }

  if (m.role === 'drums') {
    items.push({
      Comp: DrumKit, cat: 'perf',
      props: { x, y: y - 18, c },
      key: 'kit',
    });
    // Drum overhead mics
    items.push({
      Comp: MicIcon, cat: 'mic',
      props: { x: x - 26, y: y - 36, c, accent: c.accent },
      key: 'oh-l',
    });
    items.push({
      Comp: MicIcon, cat: 'mic',
      props: { x: x + 26, y: y - 36, c, accent: c.accent },
      key: 'oh-r',
    });
  }

  if (m.gear.amp) {
    items.push({
      Comp: AmpIcon, cat: 'amp',
      props: { x, y: y - 30, c, label: m.role === 'bass' ? 'BASS' : 'GTR' },
      key: 'amp',
    });
    // Amp mic
    items.push({
      Comp: MicIcon, cat: 'mic',
      props: { x: x - 4, y: y - 38, c, accent: c.accent },
      key: 'amp-mic',
    });
  }

  if (m.gear.pedalboard) {
    items.push({
      Comp: PedalboardIcon, cat: 'ped',
      props: { x: x - 30, y: y + 18, c },
      key: 'ped',
    });
  }

  if (m.gear.di) {
    items.push({
      Comp: DIIcon, cat: 'di',
      props: { x: x + 32, y: y + 20, c, label: 'DI' },
      key: 'di',
    });
  }

  if (m.gear.iem) {
    items.push({
      Comp: IEMIcon, cat: 'iem',
      props: { x: x - 38, y: y - 8, c },
      key: 'iem',
    });
  }

  return items;
}

// ── Draggable musician group ────────────────────────────────────────────────

function DraggableMusician({ m, posXY, c, onDrag, plotType }) {
  const [hovering, setHovering] = React.useState(false);
  const gear = gearForMusician(m, posXY, c);
  const role = ROLES[m.role];

  return (
    <g>
      {/* Gear renders at world coords; not part of the drag group */}
      {gear.map(({ Comp, props, key, cat }) => (
        <g key={key} opacity={emphFor(plotType, cat)}>
          <Comp {...props} />
        </g>
      ))}
      <DraggableG x={posXY.x} y={posXY.y}
                  onMove={(nx, ny) => onDrag(m.id, nx, ny)}
                  cursor="grab">
        <g onPointerEnter={() => setHovering(true)}
           onPointerLeave={() => setHovering(false)}>
          {hovering && (
            <circle cx="0" cy="0" r="30" fill="none"
                    stroke={role?.color} strokeWidth="1.5"
                    strokeDasharray="3 3" opacity="0.6" />
          )}
          <MusicianIcon role={m.role} name={m.name} c={c} />
        </g>
      </DraggableG>
    </g>
  );
}

// ── Main stage canvas ──────────────────────────────────────────────────────

function StageCanvas({ show, musicians, extras, shape, stageSize, plotType,
                       showGrid, theme, accent, exportRef,
                       onMusicianMove, onPowerMove, onRiserMove }) {
  const c = theme === 'dark' ? {
    bg: '#0d0e10', panel: '#16181c', panel2: '#1c1f25', border: '#2a2d33',
    text: '#e8e9ed', muted: '#8a8d96', subtle: '#3a3d44',
    stage: '#13151a', stageEdge: accent, accent,
  } : {
    bg: '#f7f6f3', panel: '#ffffff', panel2: '#efece6', border: '#dcd7cd',
    text: '#1a1a1a', muted: '#6b6b6b', subtle: '#c8c3b8',
    stage: '#f1ede5', stageEdge: accent, accent,
  };

  const sz = STAGE_SIZES[stageSize] || STAGE_SIZES.festival;
  const shapeData = stageShapePaths(shape, STAGE_W, STAGE_H);
  const viewH = STAGE_H + (shapeData.viewExtend || 0) + 90;

  const drummer = musicians.find((m) => m.role === 'drums');
  const riserPositionFromDrummer = drummer ? musicianXY(drummer) : null;

  const sidefills = extras.sidefills ? [
    { x: 50,  y: STAGE_H - 40, rot: 90 },
    { x: STAGE_W - 50, y: STAGE_H - 40, rot: -90 },
  ] : [];

  const drumfill = (extras.drumfill && riserPositionFromDrummer) ? {
    x: riserPositionFromDrummer.x,
    y: riserPositionFromDrummer.y - 60 * sz.riserScale,
    rot: 180,
  } : null;

  return (
    <div className="sp-stage-wrap" ref={exportRef}>
      <svg viewBox={`-20 -20 ${STAGE_W + 40} ${viewH}`}
           xmlns="http://www.w3.org/2000/svg"
           className="sp-stage" preserveAspectRatio="xMidYMid meet">
        <rect x="-20" y="-20" width={STAGE_W + 40} height={viewH} fill={c.bg} />

        <text x={STAGE_W / 2} y="-6" textAnchor="middle" fontSize="9"
              fontFamily="ui-monospace,monospace" fill={c.muted}
              letterSpacing="0.18em">↑ UPSTAGE  ·  BACKLINE WALL</text>

        {/* Stage floor */}
        {shapeData.round ? (
          <ellipse cx={STAGE_W / 2} cy={STAGE_H / 2}
                   rx={STAGE_W / 2 - 20} ry={STAGE_H / 2 - 20}
                   fill={c.stage} stroke={c.stageEdge} strokeWidth="2.5" />
        ) : (
          <path d={shapeData.outline} fill={c.stage} stroke={c.stageEdge}
                strokeWidth="2.5" />
        )}

        {showGrid && (
          <g opacity="0.4">
            {Array.from({ length: 10 }, (_, i) => (
              <line key={`v${i}`} x1={(i + 1) * 100} y1="0"
                    x2={(i + 1) * 100} y2={STAGE_H}
                    stroke={c.subtle} strokeWidth="0.5" strokeDasharray="3 3" />
            ))}
            {Array.from({ length: 5 }, (_, i) => (
              <line key={`h${i}`} x1="0" y1={(i + 1) * 100}
                    x2={STAGE_W} y2={(i + 1) * 100}
                    stroke={c.subtle} strokeWidth="0.5" strokeDasharray="3 3" />
            ))}
            <text x={STAGE_W - 4} y="14" textAnchor="end" fontSize="7"
                  fontFamily="ui-monospace,monospace" fill={c.muted}>
              {sz.deck.toUpperCase()} DECK
            </text>
          </g>
        )}

        <line x1={STAGE_W / 2} y1="0" x2={STAGE_W / 2} y2={STAGE_H}
              stroke={c.subtle} strokeWidth="0.8" strokeDasharray="6 5"
              opacity="0.5" />
        <text x={STAGE_W / 2 + 4} y={STAGE_H - 8} fontSize="7"
              fontFamily="ui-monospace,monospace" fill={c.muted}
              opacity="0.7">⎯ CL ⎯</text>

        <text x="14" y={STAGE_H / 2} fontSize="10" fontFamily="ui-monospace,monospace"
              fill={c.muted} writingMode="vertical-rl" letterSpacing="0.2em">
          STAGE RIGHT
        </text>
        <text x={STAGE_W - 8} y={STAGE_H / 2} fontSize="10"
              fontFamily="ui-monospace,monospace" fill={c.muted}
              writingMode="vertical-rl" letterSpacing="0.2em">
          STAGE LEFT
        </text>

        {/* Risers — draggable. Render before musicians so drum kit sits on top. */}
        <g opacity={emphFor(plotType, 'perf')}>
          {(extras.risers || []).map((r) => (
            <Riser key={r.id} r={r} c={c}
                   onMove={(nx, ny) => onRiserMove(r.id, nx, ny)} />
          ))}
        </g>

        {/* Power drops — draggable */}
        <g opacity={emphFor(plotType, 'pwr')}>
          {(extras.powerDropList || []).map((p) => (
            <DraggableG key={p.id} x={p.x} y={p.y}
                        onMove={(nx, ny) => onPowerMove(p.id, nx, ny)}
                        cursor="grab">
              <PowerIcon c={c} />
            </DraggableG>
          ))}
        </g>

        {/* Drumfill */}
        {drumfill && (
          <g opacity={emphFor(plotType, 'mon')}>
            <WedgeIcon {...drumfill} c={c} label="DRUMFILL" />
          </g>
        )}

        {/* Sidefills */}
        <g opacity={emphFor(plotType, 'mon')}>
          {sidefills.map((s, i) => (
            <g key={`sf${i}`}>
              <rect x={s.x - 14} y={s.y - 22} width="28" height="44" rx="2"
                    fill={c.panel2} stroke={c.muted} strokeWidth="1" />
              <line x1={s.x - 10} y1={s.y - 10} x2={s.x + 10} y2={s.y - 10}
                    stroke={c.muted} strokeWidth="0.8" />
              <line x1={s.x - 10} y1={s.y} x2={s.x + 10} y2={s.y}
                    stroke={c.muted} strokeWidth="0.8" />
              <line x1={s.x - 10} y1={s.y + 10} x2={s.x + 10} y2={s.y + 10}

  'Talkback',
];

// Source → mic category resolver.
function micCategoryFor(src) {
  const s = (src || '').toLowerCase().trim();
  if (!s) return 'all';
  if (/\bkick\b/.test(s)) return 'kick';
  if (/snare/.test(s)) return 'snare';
  if (/(rack\s*tom|floor\s*tom|\btom\b)/.test(s)) return 'tom';
  if (/(hi.?hat|^hat\b|\shat\b)/.test(s)) return 'hat';
  if (/(^| )oh( |$|\.|,)|overhead/.test(s)) return 'overhead';
  if (/bass\s*(mic|amp|cab)/.test(s)) return 'bassAmp';
  if (/(bass\s*di|bass$)/.test(s)) return 'di';
  if (/(gtr|guitar)\s*(amp|cab|mic|\d|\sL\b|\sR\b)/.test(s)) return 'guitarAmp';
  if (/^(gtr|guitar)\s*\d*$/.test(s)) return 'guitarAmp';
  if (/horn|sax|trumpet|trombone|brass|tuba|french/.test(s)) return 'horn';
  if (/(acoustic|nylon|mandolin|fiddle|violin|cello|ukulele|banjo)/.test(s)) return 'acoustic';
  if (/piano/.test(s)) return 'piano';
  if (/room|audience|amb/.test(s)) return 'room';
  if (/(keys|synth|sample|track|click|laptop|pad|drum\s*machine)/.test(s)) return 'di';
  if (/\bdi\b/.test(s)) return 'di';
  if (/iem|in.?ear/.test(s)) return 'iem';
  if (/wireless/.test(s)) return 'wireless';
  if (/(vocal|bgv|lead|backing|chorus|talkback)/.test(s)) return 'vocal';
  if (/(perc|conga|bongo|cajon|tambourine|shaker|cowbell|timbale|clave)/.test(s)) return 'tom';
  return 'all';
}

});

  <script type="text/babel" data-presets="react">
// input-list.jsx — editable channel list table.

function buildChannelList(musicians) {
  const order = ['drums', 'bass', 'guitar', 'rguitar', 'keys', 'dj', 'horns',
                 'perc', 'vocal', 'bgv'];
  const sorted = [...musicians].sort((a, b) =>
    order.indexOf(a.role) - order.indexOf(b.role));
  const rows = [];
  let ch = 1;
  for (const m of sorted) {
    const chs = channelsForRole(m.role, m.name);
    for (const c of chs) {
      rows.push({
        id: uid('ch'), ch: ch++, ...c, role: m.role,
      });
    }
  }
  return rows;
}

const STAND_OPTIONS = ['tall', 'short', 'clip', '—'];

function InputList({ channels, setChannels, musicians, show, accent, theme }) {
  const update = (id, patch) => {
    setChannels(channels.map((c) => c.id === id ? { ...c, ...patch } : c));
  };
  const remove = (id) => {
    setChannels(channels.filter((c) => c.id !== id));
  };
  const add = () => {
    const ch = (channels[channels.length - 1]?.ch || 0) + 1;
    setChannels([...channels, {
      id: uid('row'), ch, src: 'New source', mic: 'SM58', stand: 'tall',
      actor: '', note: '', role: 'other',
    }]);
  };
  const renumber = () => {
    setChannels(channels.map((c, i) => ({ ...c, ch: i + 1 })));
  };
  const regenerate = () => {
    if (!confirm('Regenerate channel list from current lineup? This discards your edits.'))
      return;
    setChannels(buildChannelList(musicians));
  };
  const move = (idx, dir) => {
    const j = idx + dir;
    if (j < 0 || j >= channels.length) return;
    const next = [...channels];
    [next[idx], next[j]] = [next[j], next[idx]];
    setChannels(next);
  };

  const actorOptions = musicians.map((m) => m.name).filter(Boolean);

  // Stand totals for footer summary — auto-updates as user edits.
  const stands = channels.reduce((acc, r) => {
    if (r.stand && r.stand !== '—') acc[r.stand] = (acc[r.stand] || 0) + 1;
    return acc;
  }, {});

  return (
    <div className="sp-il">
      <header className="sp-il-head">
        <div>
          <div className="sp-il-eyebrow">INPUT LIST · STAGE LEFT TO RIGHT</div>
          <h2 className="sp-il-title">{show.band}</h2>
          <div className="sp-il-meta">
            {show.venue} · {show.date}
          </div>
        </div>
        <div className="sp-il-totals">
          <div className="sp-il-totals-row">
            <span className="sp-il-totals-num" style={{ color: accent }}>
              {channels.length}
            </span>
            <span className="sp-il-totals-lbl">channels</span>
          </div>
          <div className="sp-il-totals-row">
            <span className="sp-il-totals-num">{musicians.length}</span>
            <span className="sp-il-totals-lbl">performers</span>
          </div>
        </div>
      </header>

      <div className="sp-il-toolbar">
        <button className="sp-btn-ghost sp-btn-tiny" onClick={renumber}>
          Renumber 01…{String(channels.length).padStart(2, '0')}
        </button>
        <button className="sp-btn-ghost sp-btn-tiny" onClick={regenerate}>
          ↻ Regenerate from lineup
        </button>
        <div className="sp-il-toolbar-spacer" />
        <button className="sp-btn-add" onClick={add}>+ Channel</button>
      </div>

      <MicDatalists />

      <table className="sp-il-table sp-il-table-editable">
        <thead>
          <tr>
            <th style={{ width: 32 }}></th>
            <th style={{ width: 56 }}>CH</th>
            <th>SOURCE</th>
            <th>MIC / DI</th>
            <th style={{ width: 86 }}>STAND</th>
            <th>ACTOR</th>
            <th>NOTES</th>
            <th style={{ width: 28 }}></th>
          </tr>
        </thead>
        <tbody>
          {channels.map((r, idx) => {
            const roleColor = ROLES[r.role]?.color || '#888';
            return (
              <tr key={r.id}>
                <td className="sp-il-handle">
                  <button className="sp-il-arr" onClick={() => move(idx, -1)}
                          title="Move up" disabled={idx === 0}>▲</button>
                  <button className="sp-il-arr" onClick={() => move(idx, 1)}
                          title="Move down"
                          disabled={idx === channels.length - 1}>▼</button>
                </td>
                <td>
                  <input className="sp-il-input sp-il-ch-input"
                         style={{ borderColor: roleColor }}
                         type="number" min="1" max="999"
                         value={r.ch}
                         onChange={(e) => update(r.id, { ch: Number(e.target.value) })} />
                </td>
                <td>
                  <input className="sp-il-input sp-il-src" value={r.src}
                         list="sp-micdb-sources" placeholder="Source"
                         onChange={(e) => update(r.id, { src: e.target.value })} />
                </td>
                <td>
                  <input className="sp-il-input sp-il-mic"
                         list={`sp-micdb-${micCategoryFor(r.src)}`} value={r.mic}
                         placeholder="Mic / DI"
                         onChange={(e) => update(r.id, { mic: e.target.value })} />
                </td>
                <td>
                  <select className="sp-il-input sp-il-stand"
                          value={r.stand || '—'}
                          onChange={(e) => update(r.id, { stand: e.target.value })}>
                    {STAND_OPTIONS.map((s) => <option key={s} value={s}>{s}</option>)}
                  </select>
                </td>
                <td>
                  <select className="sp-il-input sp-il-actor"
                          value={r.actor || ''}
                          onChange={(e) => update(r.id, { actor: e.target.value })}>
                    <option value="">—</option>
                    {actorOptions.map((a) => (
                      <option key={a} value={a}>{a}</option>
                    ))}
                    {r.actor && !actorOptions.includes(r.actor) && (
                      <option value={r.actor}>{r.actor} (not in lineup)</option>
                    )}
                  </select>
                </td>
                <td>
                  <input className="sp-il-input sp-il-note"
                         value={r.note || ''} placeholder="—"
                         onChange={(e) => update(r.id, { note: e.target.value })} />
                </td>
                <td>
                  <button className="sp-pill-x" onClick={() => remove(r.id)}
                          title="Remove channel">×</button>
                </td>
              </tr>
            );
          })}
          {channels.length === 0 && (
            <tr>
              <td colSpan="8" className="sp-il-empty">
                No channels. Click + Channel above to add one, or ↻ Regenerate
                to pull from the current lineup.
              </td>
            </tr>
          )}
        </tbody>
      </table>

      <footer className="sp-il-foot">
        <div className="sp-il-summary">
          <div className="sp-il-sum-h">STAND COUNT</div>
          <div className="sp-il-sum-grid">
            {Object.entries(stands).map(([k, v]) => (
              <div key={k} className="sp-il-sum-cell">
                <span className="sp-il-sum-num">{v}</span>
                <span className="sp-il-sum-lbl">{k}</span>
              </div>
            ))}
            {Object.keys(stands).length === 0 && (
              <span className="sp-il-sum-lbl">no stands</span>
            )}
          </div>
        </div>
        <div className="sp-il-summary">
          <div className="sp-il-sum-h">CONTACT</div>
          <div className="sp-il-sum-text">
            <div>{show.contact}</div>
            <div className="sp-il-sum-muted">{show.engineer}</div>
          </div>
        </div>
        <div className="sp-il-summary">
          <div className="sp-il-sum-h">POWER</div>
          <div className="sp-il-sum-text">{show.power}</div>
        </div>
      </footer>
    </div>
  );
}

Object.assign(window, { InputList, buildChannelList });

  </script>

// Common item names (for the ITEM column datalist).
const BACKLINE_ITEMS = [
  'Drum kit', 'Snare', 'Cymbals', 'Hardware', 'Throne', 'Kick pedal',
  'Hi-hat stand', 'Bass amp', 'Bass cab', 'Bass guitar', 'Guitar amp',
  'Guitar cab', 'Electric guitar', 'Acoustic guitar', 'Keyboard', 'Keys stand',
  'Sustain pedal', 'Mic stand', 'Vocal mic', 'Drum mic', 'Instrument mic',
  'IEM pack', 'Wireless system', 'DI box', 'DJ controller', 'Mixer',
  'Riser', 'Patch bay', 'Snake', 'Power conditioner',
];

// Resolve which DB category a row belongs to based on its ITEM text.
function backlineCategoryFor(item) {
  const i = (item || '').toLowerCase().trim();
  if (!i) return 'all';
  if (/\b(drum\s*kit|kit|drums)\b/.test(i) && !/snare|cymbal/.test(i)) return 'drumKits';
  if (/snare/.test(i)) return 'snares';
  if (/cymbal/.test(i)) return 'cymbals';
  if (/throne|stool/.test(i)) return 'thrones';
  if (/hi-?hat\s*stand/.test(i)) return 'hardware';
  if (/(kick\s*pedal|bass\s*pedal|hardware|double\s*pedal)/.test(i)) return 'hardware';
  if (/sustain/.test(i)) return 'sustainPedals';
  if (/bass\s*(amp|head)/.test(i)) return 'bassHeads';
  if (/bass\s*cab/.test(i)) return 'bassCabs';
  if (/bass(\s|$)/.test(i)) return 'bassGuitars';
  if (/(gtr|guitar)\s*amp/.test(i)) return 'guitarAmps';
  if (/(gtr|guitar)\s*cab/.test(i)) return 'guitarCabs';
  if (/acoustic/.test(i)) return 'acousticGuitars';
  if (/guitar|gtr/.test(i)) return 'electricGuitars';
  if (/(keyboard|keys|piano|organ|synth)\s*stand/.test(i)) return 'keysStands';
  if (/keyboard|piano|organ|synth/.test(i)) return 'keyboards';
  if (/keys(\s|$)/.test(i)) return 'keyboards';
  if (/mic\s*stand/.test(i)) return 'micStands';
  if (/(iem|in.?ear)/.test(i)) return 'iemPacks';
  if (/wireless/.test(i)) return 'wirelessSystems';
  if (/\bdi(\s|box|$)/.test(i)) return 'DIs';
  if (/dj|controller|cdj|turntable|mixer/.test(i)) return 'djControllers';
  if (/drum\s*mic|kick\s*mic|snare\s*mic|tom\s*mic|overhead/.test(i)) return 'drumMics';
  if (/vocal\s*mic|bgv\s*mic/.test(i)) return 'vocalMics';
  if (/instrument\s*mic|amp\s*mic|horn\s*mic/.test(i)) return 'instrumentMics';
  if (/mic\b/.test(i)) return 'vocalMics';
  return 'all';
}

// Precomputed list of every model across categories — used for the "all" fallback.
const BACKLINE_ALL = [...new Set(
  Object.values(BACKLINE_DB).flat()
)];

// Render the datalists once. Each row's BRAND/MODEL input references one by
// the resolved category ID.
const BacklineDatalists = React.memo(function BacklineDatalists() {
  return (
    <>
      <datalist id="sp-bldb-items">
        {BACKLINE_ITEMS.map((it) => <option key={it} value={it} />)}
      </datalist>
      {Object.entries(BACKLINE_DB).map(([cat, opts]) => (
        <datalist key={cat} id={`sp-bldb-${cat}`}>
          {opts.map((o) => <option key={o} value={o} />)}
        </datalist>
      ))}
      <datalist id="sp-bldb-all">
        {BACKLINE_ALL.map((o) => <option key={o} value={o} />)}
      </datalist>
    </>
  );
});

Object.assign(window, {
  BACKLINE_DB, BACKLINE_ITEMS, backlineCategoryFor, BacklineDatalists,
});

  <script type="text/babel" data-presets="react">
// backline.jsx — editable backline (equipment) list.

const OWNER_OPTIONS = ['Band', 'House', 'Venue', 'Rented'];

function buildBacklineList(musicians) {
  const order = ['drums', 'bass', 'guitar', 'rguitar', 'keys', 'dj', 'horns',
                 'perc', 'vocal', 'bgv'];
  const sorted = [...musicians].sort((a, b) =>
    order.indexOf(a.role) - order.indexOf(b.role));
  const rows = [];
  for (const m of sorted) {
    const items = backlineForRole(m.role, m.name);
    for (const it of items) {
      rows.push({
        id: uid('bl'),
        actor: m.name, role: m.role, ...it,
      });
    }
  }
  return rows;
}

function BacklineList({ backline, setBackline, musicians, show, accent }) {
  const update = (id, patch) => {
    setBackline(backline.map((b) => b.id === id ? { ...b, ...patch } : b));
  };
  const remove = (id) => {
    setBackline(backline.filter((b) => b.id !== id));
  };
  const add = () => {
    setBackline([...backline, {
      id: uid('bl'),
      item: 'New item', detail: '', owner: 'Band', note: '',
      actor: '', role: 'other',
    }]);
  };
  const regenerate = () => {
    if (!confirm('Regenerate backline from current lineup? This discards your edits.'))
      return;
    setBackline(buildBacklineList(musicians));
  };
  const move = (idx, dir) => {
    const j = idx + dir;
    if (j < 0 || j >= backline.length) return;
    const next = [...backline];
    [next[idx], next[j]] = [next[j], next[idx]];
    setBackline(next);
  };

  const actorOptions = musicians.map((m) => m.name).filter(Boolean);

  // Owner totals for footer summary.
  const owners = backline.reduce((acc, r) => {
    const k = r.owner || '—';
    acc[k] = (acc[k] || 0) + 1;
    return acc;
  }, {});

  return (
    <div className="sp-il">
      <BacklineDatalists />
      <header className="sp-il-head">
        <div>
          <div className="sp-il-eyebrow">BACKLINE · EQUIPMENT LIST</div>
          <h2 className="sp-il-title">{show.band}</h2>
          <div className="sp-il-meta">
            {show.venue} · {show.date}
          </div>
        </div>
        <div className="sp-il-totals">
          <div className="sp-il-totals-row">
            <span className="sp-il-totals-num" style={{ color: accent }}>
              {backline.length}
            </span>
            <span className="sp-il-totals-lbl">items</span>
          </div>
          <div className="sp-il-totals-row">
            <span className="sp-il-totals-num">{musicians.length}</span>
            <span className="sp-il-totals-lbl">performers</span>
          </div>
        </div>
      </header>

      <div className="sp-il-toolbar">
        <button className="sp-btn-ghost sp-btn-tiny" onClick={regenerate}>
          ↻ Regenerate from lineup
        </button>
        <div className="sp-il-toolbar-spacer" />
        <button className="sp-btn-add" onClick={add}>+ Item</button>
      </div>

      <table className="sp-il-table sp-il-table-editable">
        <thead>
          <tr>
            <th style={{ width: 32 }}></th>
            <th>ITEM</th>
            <th>BRAND / MODEL</th>
            <th style={{ width: 96 }}>OWNER</th>
            <th>FOR</th>
            <th>NOTES</th>
            <th style={{ width: 28 }}></th>
          </tr>
        </thead>
        <tbody>
          {backline.map((r, idx) => {
            const roleColor = ROLES[r.role]?.color || '#888';
            return (
              <tr key={r.id}>
                <td className="sp-il-handle">
                  <button className="sp-il-arr" onClick={() => move(idx, -1)}
                          title="Move up" disabled={idx === 0}>▲</button>
                  <button className="sp-il-arr" onClick={() => move(idx, 1)}
                          title="Move down"
                          disabled={idx === backline.length - 1}>▼</button>
                </td>
                <td>
                  <div className="sp-bl-item-cell">
                    <span className="sp-bl-dot" style={{ background: roleColor }} />
                    <input className="sp-il-input sp-il-src" value={r.item}
                           list="sp-bldb-items" placeholder="Item"
                           onChange={(e) => update(r.id, { item: e.target.value })} />
                  </div>
                </td>
                <td>
                  <input className="sp-il-input sp-il-mic" value={r.detail || ''}
                         list={`sp-bldb-${backlineCategoryFor(r.item)}`}
                         placeholder="brand / model / size"
                         onChange={(e) => update(r.id, { detail: e.target.value })} />
                </td>
                <td>
                  <select className={`sp-il-input sp-il-stand sp-bl-owner sp-bl-owner-${(r.owner || '').toLowerCase()}`}
                          value={r.owner || ''}
                          onChange={(e) => update(r.id, { owner: e.target.value })}>
                    {OWNER_OPTIONS.map((o) => <option key={o} value={o}>{o}</option>)}
                  </select>
                </td>
                <td>
                  <select className="sp-il-input sp-il-actor"
                          value={r.actor || ''}
                          onChange={(e) => update(r.id, { actor: e.target.value })}>
                    <option value="">—</option>
                    {actorOptions.map((a) => (
                      <option key={a} value={a}>{a}</option>
                    ))}
                    {r.actor && !actorOptions.includes(r.actor) && (
                      <option value={r.actor}>{r.actor} (not in lineup)</option>
                    )}
                  </select>
                </td>
                <td>
                  <input className="sp-il-input sp-il-note"
                         value={r.note || ''} placeholder="—"
                         onChange={(e) => update(r.id, { note: e.target.value })} />
                </td>
                <td>
                  <button className="sp-pill-x" onClick={() => remove(r.id)}
                          title="Remove item">×</button>
                </td>
              </tr>
            );
          })}
          {backline.length === 0 && (
            <tr>
              <td colSpan="7" className="sp-il-empty">
                No backline items. Click + Item or ↻ Regenerate from lineup.
              </td>
            </tr>
          )}
        </tbody>
      </table>

// ── Export helpers ─────────────────────────────────────────────────────────

async function exportSvgAsPng(svgEl, filename, scale = 2) {
  const clone = svgEl.cloneNode(true);
  const style = document.createElementNS('http://www.w3.org/2000/svg', 'style');
  style.textContent = `
    @import url('https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap');
  `;
  clone.insertBefore(style, clone.firstChild);

  const xml = new XMLSerializer().serializeToString(clone);
  const blob = new Blob([xml], { type: 'image/svg+xml;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const img = new Image();
  img.crossOrigin = 'anonymous';
  await new Promise((res, rej) => {
    img.onload = res; img.onerror = rej; img.src = url;
  });
  const vb = svgEl.viewBox.baseVal;
  const w = (vb.width || svgEl.clientWidth) * scale;
  const h = (vb.height || svgEl.clientHeight) * scale;
  const cnv = document.createElement('canvas');
  cnv.width = w; cnv.height = h;
  const ctx = cnv.getContext('2d');
  ctx.drawImage(img, 0, 0, w, h);
  URL.revokeObjectURL(url);
  cnv.toBlob((b) => {
    const a = document.createElement('a');
    a.href = URL.createObjectURL(b);
    a.download = filename;
    a.click();
    URL.revokeObjectURL(a.href);
  }, 'image/png');
}

  React.useEffect(() => {

      const ty = e?.data?.type;
      if (ty === '__activate_edit_mode') setTweaksOpen(true);
      else if (ty === '__deactivate_edit_mode') setTweaksOpen(false);

      window.postMessage({ type: '__activate_edit_mode' }, '*');
